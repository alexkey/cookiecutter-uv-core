name: {{ cookiecutter.docker_compose_name }}

services:
  {{ cookiecutter.service_name }}:
    image: "${DOCKER_IMAGE_NAME}"
    platform: "${DOCKER_BUILD_PLATFORM}"
    tty: true
    stdin_open: true
    links:
      - redis
      - postgres
    volumes:
      - "${CURDIR}:${DOCKER_MOUNT_POINT}"
    ports:
      # This configuration binds port of the container to the host's TCP port.
      # If no specific IP address is provided, Docker will bind the port to all network
      # interfaces (0.0.0.0). As a result, the exposed port will be accessible
      # externally.
      - "127.0.0.1:${DOCKER_HOST_PORT}:${DOCKER_CONTAINER_PORT}"
    expose:
      - "${DOCKER_CONTAINER_PORT}"
    environment:
      # Database
      DATABASE_URL: "postgresql+asyncpg://database:database@postgres:5432/database"
    command: [
      "-c",
      "./docker/scripts/wait_for_pg.py \
      && /bin/bash"
    ]

    # TODO(axk): ///


  redis:
    image: "redis:{{ cookiecutter.redis_image_tag }}"

  postgres:
    image: "postgres:{{ cookiecutter.postgres_image_tag }}"
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: "{{ cookiecutter.postgres_user }}"
      POSTGRES_PASSWORD: "{{ cookiecutter.postgres_user }}"
      POSTGRES_DB: "{{ cookiecutter.postgres_user }}"
